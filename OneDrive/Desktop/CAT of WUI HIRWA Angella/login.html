<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTB Register</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
<div class="page-bg">
  <div class="card">
    <div class="logo-wrap">
      <img src="logo2.png" alt="RTB Rwanda TVET Board" class="logo">
    </div>
    <h2 class="register-title">REGISTER</h2>
    <div class="stepper">
      <div class="step active">
        <div class="step-circle active">1</div>
        <span class="step-label active">Personal Info.</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">2</div>
        <span class="step-label">Address Info.</span>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Province</label>
        <div class="select-wrap">
          <select>
            <option>Northen</option>
          </select>
          <img src="down.png" alt="" class="chevron">
        </div>
      </div>
      <div class="form-group">
        <label>District</label>
        <div class="select-wrap">
          <select>
            <option>Huge</option>
          </select>
          <img src="down.png" alt="" class="chevron">
        </div>
      </div>
      <div class="form-group">
        <label>Sector</label>
        <div class="select-wrap">
          <select>
            <option>Tumba</option>
          </select>
          <img src="down.png" alt="" class="chevron">
        </div>
      </div>
      <div class="form-group">
        <label>Cell</label>
        <div class="select-wrap">
          <select>
            <option>Cyarwo</option>
          </select>
          <img src="down.png" alt="" class="chevron">
        </div>
      </div>
      <div class="form-group full-width">
        <label>Village</label>
        <div class="select-wrap">
          <select>
            <option>Ubumwe</option>
          </select>
          <img src="down.png" alt="" class="chevron">
        </div>
      </div>
    </div>
    <div class="btn-wrap">
      <button class="btn-register">Register</button>
    </div>
    <p class="login-link">Already registered? <a href="#">Login</a></p>
  </div>
</div>
</body>
</html>
